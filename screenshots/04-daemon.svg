<text x="380.0" y="21" text-anchor="middle" fill="#8b949e" font-size="12.5" font-weight="600" letter-spacing="0.3">notionwiki daemon --help</text>
<rect x="0" y="34" width="760" height="2" fill="#ec4899" fill-opacity="0.55"/>
<text x="22" y="58" xml:space="preserve" fill="#7dd3fc" font-size="13.5">$ notionwiki daemon --help</text>
<text x="22" y="78" xml:space="preserve" fill="#c9d1d9" font-size="13.5"></text>
<text x="22" y="98" xml:space="preserve" fill="#facc15" font-size="13.5"> Usage: notionwiki daemon [OPTIONS]</text>
<text x="22" y="118" xml:space="preserve" fill="#c9d1d9" font-size="13.5"></text>
<text x="22" y="138" xml:space="preserve" fill="#c9d1d9" font-size="13.5"> Optional long-lived pull loop — an alternative to `service install`.</text>
<text x="22" y="158" xml:space="preserve" fill="#c9d1d9" font-size="13.5"></text>
<text x="22" y="178" xml:space="preserve" fill="#94a3b8" font-size="13.5">┌─ Options ─────────────────────────────────────────────────────────────-─┐</text>
<text x="22" y="198" xml:space="preserve" fill="#94a3b8" font-size="13.5">│ --interval-seconds     FLOAT    Pull cadence in seconds [default: 60.0] │</text>
<text x="22" y="218" xml:space="preserve" fill="#94a3b8" font-size="13.5">│ --serve-graph                   Co-host the graph UI in this process   │</text>
<text x="22" y="238" xml:space="preserve" fill="#94a3b8" font-size="13.5">│ --graph-port           INTEGER  [default: 7777]                        │</text>
<text x="22" y="258" xml:space="preserve" fill="#94a3b8" font-size="13.5">│ --help                          Show this message and exit.            │</text>
<text x="22" y="278" xml:space="preserve" fill="#94a3b8" font-size="13.5">└───────────────────────────────────────────────────────────────────────-─┘</text>
</svg>