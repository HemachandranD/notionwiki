<svg xmlns="http://www.w3.org/2000/svg" width="760" height="504" viewBox="0 0 760 504" font-family="SFMono-Regular, Menlo, Consolas, 'Liberation Mono', monospace">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#161b22"/>
    <stop offset="100%" stop-color="#0d1117"/>
  </linearGradient>
  <linearGradient id="titlebar" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#21262d"/>
    <stop offset="100%" stop-color="#1c2128"/>
  </linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#000000" flood-opacity="0.45"/>
  </filter>
</defs>
<rect x="0" y="0" width="760" height="504" rx="14" ry="14" fill="url(#bg)" stroke="#6366f1" stroke-opacity="0.35" stroke-width="1.5" filter="url(#shadow)"/>
<path d="M0,14 a14,14 0 0 1 14,-14 h732 a14,14 0 0 1 14,14 v20 h-760 z" fill="url(#titlebar)"/>
<circle cx="24" cy="17" r="6.5" fill="#ff5f56"/>
<circle cx="44" cy="17" r="6.5" fill="#ffbd2e"/>
<circle cx="64" cy="17" r="6.5" fill="#27c93f"/>
<text x="380.0" y="21" text-anchor="middle" fill="#8b949e" font-size="12.5" font-weight="600" letter-spacing="0.3">notionwiki — CLI overview</text>
<rect x="0" y="34" width="760" height="2" fill="#6366f1" fill-opacity="0.55"/>
<text x="22" y="58" xml:space="preserve" fill="#7dd3fc" font-size="13.5">$ notionwiki --help</text>
<text x="22" y="78" xml:space="preserve" fill="#c9d1d9" font-size="13.5"></text>
<text x="22" y="98" xml:space="preserve" fill="#facc15" font-size="13.5"> Usage: notionwiki [OPTIONS] COMMAND [ARGS]...</text>
<text x="22" y="118" xml:space="preserve" fill="#c9d1d9" font-size="13.5"></text>
<text x="22" y="138" xml:space="preserve" fill="#94a3b8" font-size="13.5">┌─ Options ───────────────────────────────────────────────────────────────┐</text>
<text x="22" y="158" xml:space="preserve" fill="#94a3b8" font-size="13.5">│ --help          Show this message and exit.                             │</text>
<text x="22" y="178" xml:space="preserve" fill="#94a3b8" font-size="13.5">└───────────────────────────────────────────────────────────────────────-─┘</text>
<text x="22" y="198" xml:space="preserve" fill="#94a3b8" font-size="13.5">┌─ Commands ──────────────────────────────────────────────────────────────┐</text>
<text x="22" y="218" xml:space="preserve" fill="#94a3b8" font-size="13.5">│ init     Interactive setup wizard: wiki location, token, root page,     │</text>
<text x="22" y="238" xml:space="preserve" fill="#94a3b8" font-size="13.5">│          databases, schedule.                                           │</text>
<text x="22" y="258" xml:space="preserve" fill="#94a3b8" font-size="13.5">│ pull     Force an immediate pull/convert/write cycle (ingestion).       │</text>
<text x="22" y="278" xml:space="preserve" fill="#94a3b8" font-size="13.5">│ status   Ingestion health, last pull time, recent errors.               │</text>
<text x="22" y="298" xml:space="preserve" fill="#94a3b8" font-size="13.5">│ graph    Regenerate wiki/index.md + wiki/graph.json, optionally serve   │</text>
<text x="22" y="318" xml:space="preserve" fill="#94a3b8" font-size="13.5">│          the graph UI.                                                  │</text>
<text x="22" y="338" xml:space="preserve" fill="#94a3b8" font-size="13.5">│ daemon   Optional long-lived pull loop — an alternative to `service     │</text>
<text x="22" y="358" xml:space="preserve" fill="#94a3b8" font-size="13.5">│          install`.                                                      │</text>
<text x="22" y="378" xml:space="preserve" fill="#94a3b8" font-size="13.5">│ service  Manage the scheduled notionwiki pull.                          │</text>
<text x="22" y="398" xml:space="preserve" fill="#94a3b8" font-size="13.5">│ open     Print the Notion URL / local path for a source.                │</text>
<text x="22" y="418" xml:space="preserve" fill="#94a3b8" font-size="13.5">│ lint     Agent-run lint pass over the wiki layer: orphans, dangling     │</text>
<text x="22" y="438" xml:space="preserve" fill="#94a3b8" font-size="13.5">│          links, drift.                                                  │</text>
<text x="22" y="458" xml:space="preserve" fill="#94a3b8" font-size="13.5">│ config   View or update saved settings without re-running init.         │</text>
<text x="22" y="478" xml:space="preserve" fill="#94a3b8" font-size="13.5">└───────────────────────────────────────────────────────────────────────-─┘</text>
</svg>