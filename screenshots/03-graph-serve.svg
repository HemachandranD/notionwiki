<svg xmlns="http://www.w3.org/2000/svg" width="760" height="244" viewBox="0 0 760 244" font-family="SFMono-Regular, Menlo, Consolas, 'Liberation Mono', monospace">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#161b22"/>
    <stop offset="100%" stop-color="#0d1117"/>
  </linearGradient>
  <linearGradient id="titlebar" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#21262d"/>
    <stop offset="100%" stop-color="#1c2128"/>
  </linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#000000" flood-opacity="0.45"/>
  </filter>
</defs>
<rect x="0" y="0" width="760" height="244" rx="14" ry="14" fill="url(#bg)" stroke="#0ea5e9" stroke-opacity="0.35" stroke-width="1.5" filter="url(#shadow)"/>
<path d="M0,14 a14,14 0 0 1 14,-14 h732 a14,14 0 0 1 14,14 v20 h-760 z" fill="url(#titlebar)"/>
<circle cx="24" cy="17" r="6.5" fill="#ff5f56"/>
<circle cx="44" cy="17" r="6.5" fill="#ffbd2e"/>
<circle cx="64" cy="17" r="6.5" fill="#27c93f"/>
<text x="380.0" y="21" text-anchor="middle" fill="#8b949e" font-size="12.5" font-weight="600" letter-spacing="0.3">notionwiki graph — regenerate + serve</text>
<rect x="0" y="34" width="760" height="2" fill="#0ea5e9" fill-opacity="0.55"/>
<text x="22" y="58" xml:space="preserve" fill="#7dd3fc" font-size="13.5">$ notionwiki graph</text>
<text x="22" y="78" xml:space="preserve" fill="#4ade80" font-size="13.5">✓ Regenerated wiki/index.md and wiki/graph.json (64 nodes, 230 edges)</text>
<text x="22" y="98" xml:space="preserve" fill="#c9d1d9" font-size="13.5"></text>
<text x="22" y="118" xml:space="preserve" fill="#7dd3fc" font-size="13.5">$ notionwiki graph --serve</text>
<text x="22" y="138" xml:space="preserve" fill="#4ade80" font-size="13.5">✓ Regenerated wiki/index.md and wiki/graph.json (64 nodes, 230 edges)</text>
<text x="22" y="158" xml:space="preserve" fill="#c9d1d9" font-size="13.5">Serving graph UI at http://127.0.0.1:7777/graph  (Ctrl+C to stop)</text>
<text x="22" y="178" xml:space="preserve" fill="#c9d1d9" font-size="13.5"></text>
<text x="22" y="198" xml:space="preserve" fill="#7dd3fc" font-size="13.5">$ curl -s -o /dev/null -w &quot;%{http_code}&quot; http://127.0.0.1:7777/graph</text>
<text x="22" y="218" xml:space="preserve" fill="#c9d1d9" font-size="13.5">200</text>
</svg>